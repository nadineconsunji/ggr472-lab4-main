<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGR472: Lab 4</title>
    <!-- Mapbox GL JS library (JavaScript loaded in for interactive maps) -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js'></script>
    <!-- Mapbox GL CSS (CSS loaded in for styling) -->
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css' rel='stylesheet' /> 
    <!-- Mapbox geocoder plugin -->
    <script
        src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet"
        href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.css"
        type="text/css">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap CSS (for responsive layout/grids) -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous"> <!--linking to bootstrap -->
    <!-- Turf.js -->
    <script src='https://unpkg.com/@turf/turf@7.2.0/turf.min.js'></script>
</head>

<body>
    <!-- MAP CONTAINER -->
    <div id='map' class='map'></div>
        <!-- Return to view bar -->
            <div class='map-search-container'>
                <button type="button" class="btn btn-success btn-lg rounded-pill shadow-sm" id="returnbutton">Return to view</button>
            </div>
        
        <!-- Collisions (hexgrid) legend -->
            <div id='collisions-legend' class='legend'>
                <h4>Number of pedestrian/cycling related collisions</h4>
                <div><span></span>0</div>
                <div><span></span>0-5</div> 
                <div><span></span>5-10</div>
                <div><span></span>10-20</div>
                <div><span></span>20-30</div>
                <div><span></span>30-40</div>
                <div><span></span>40-50</div>
                <div><span></span>50-60</div>
                <div><span></span>>60</div>
                <div><span></span>Highest (maximum)</div>
            </div>

        <!-- General legend/key -->
        <div id='general-legend' class='legend'>
            <h4>Key</h4>
            <div><span></span>Toronto boundary</div> 
            <div><span></span>Pedestrian/cycling collision locations</div>
        </div>

        <!-- Filter features -->
            <div class='map-data-container'>
                <label class="option-label" for="layercheck">Filter map view</label>

                <!-- Checkbox to show/hide hexgrid layer -->
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="layercheck" checked>
                    <label class="form-check-label" for="layercheck">Show collisions hexgrid</label>
                </div>

                <!-- Checkbox to show/hide collision points layer -->
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="layercheck2" checked>
                    <label class="form-check-label" for="layercheck">Show collisions points</label>
                </div>

                <!-- Checkbox to show/hide legends -->
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="legendcheck" checked>
                    <label class="form-check-label" for="legendcheck">Show legends</label>
                </div>

                <!-- Dropdown for selecting hexgrids depending on number of collisions -->
                <form>
                    <fieldset id="boundaryfieldset">
                        <label class="option-label">Select areas with a number of collisions</label>
                        <select id="boundary" name="boundary">
                            <option value="" disabled selected>Select...</option>
                            <option value="All">Show any number of collisions</option>
                            <option value="10">Over 10</option>
                            <option value="30">Over 30</option>
                            <option value="60">Over 60</option>
                            <option value="Max">Maximum</option>
                        </select>
                    </fieldset>
                </form>

            </div>

    <!-- Bootstrap JavaScript bundle (for interactive components)-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script src="script.js"></script>

</body>

</html>
